apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: azure-kv-provider
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true"
    userAssignedIdentityID: "" # AKS will use the identity we granted access to
    keyvaultName: "${KEYVAULT_NAME}" # To be replaced by the pipeline or set manually
    cloudName: ""
    objects: |
      array:
        - |
          objectName: app-db-password
          objectType: secret
          objectVersion: ""
    tenantId: "${TENANT_ID}" # To be replaced by the pipeline or set manually
