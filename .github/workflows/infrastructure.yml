name: "Infrastructure – Provision AKS"

# ── Trigger ──────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main]
    paths:
      - "terraform/**"
  workflow_dispatch: # Allow manual trigger

# ── Global permissions for Azure OIDC ────────────────────────────────────────
permissions:
  id-token: write   # Required for OIDC federation
  contents: read

# ── Environment variables shared across all jobs ─────────────────────────────
env:
  TF_WORKING_DIR: terraform
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_USE_OIDC: true
  # Terraform Backend (Azure Storage)
  BACKEND_RESOURCE_GROUP: "terraform-storage-rg"
  BACKEND_STORAGE_ACCOUNT: "terraformstatexlrwdrza"
  BACKEND_CONTAINER: "tfstatefiles"

###############################################################################
# JOBS
###############################################################################
jobs:

  # ╔═══════════════════════════════════════════════════════════════════════════╗
  # ║  Stage 1: Validate                                                      ║
  # ╚═══════════════════════════════════════════════════════════════════════════╝
  validate:
    name: "Terraform Validate"
    runs-on: ubuntu-latest
    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Upload Terraform Manifests
        uses: actions/upload-artifact@v4
        with:
          name: terraform-out
          path: ${{ env.TF_WORKING_DIR }}
          retention-days: 5

  # ╔═══════════════════════════════════════════════════════════════════════════╗
  # ║  Stage 2a: Deploy Dev AKS Cluster                                       ║
  # ╚═══════════════════════════════════════════════════════════════════════════╝
  deploy-dev:
    name: "Deploy Dev AKS Cluster"
    needs: validate
    runs-on: ubuntu-latest
    environment: dev   # GitHub Environment – no approval required by default
    env:
      TF_VAR_environment: dev
    steps:

      - name: Download Terraform
        uses: actions/download-artifact@v4
        with:
          name: terraform-out
          path: terraform-out

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Write SSH Public Key
        run: |
          echo "${{ secrets.SSH_PUBLIC_KEY }}" > /tmp/aks-ssh-key.pub
          chmod 600 /tmp/aks-ssh-key.pub

      - name: Terraform Init
        working-directory: terraform-out
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ env.BACKEND_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ env.BACKEND_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ env.BACKEND_CONTAINER }}" \
            -backend-config="key=aks-dev.tfstate"

      - name: Terraform Plan
        working-directory: terraform-out
        run: |
          terraform plan \
            -var "ssh_public_key=/tmp/aks-ssh-key.pub" \
            -var "environment=dev" \
            -out=dev-${{ github.run_id }}.tfplan

      - name: Terraform Apply
        working-directory: terraform-out
        run: terraform apply -auto-approve dev-${{ github.run_id }}.tfplan

  # ╔═══════════════════════════════════════════════════════════════════════════╗
  # ║  Stage 2b: Deploy Prod AKS Cluster                                      ║
  # ╚═══════════════════════════════════════════════════════════════════════════╝
  deploy-prod:
    name: "Deploy Prod AKS Cluster"
    needs: deploy-dev
    runs-on: ubuntu-latest
    environment: prod   # GitHub Environment – configure Required Reviewers for manual approval
    env:
      TF_VAR_environment: prod
    steps:

      - name: Download Terraform
        uses: actions/download-artifact@v4
        with:
          name: terraform-out
          path: terraform-out

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Write SSH Public Key
        run: |
          echo "${{ secrets.SSH_PUBLIC_KEY }}" > /tmp/aks-ssh-key.pub
          chmod 600 /tmp/aks-ssh-key.pub

      - name: Terraform Init
        working-directory: terraform-out
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ env.BACKEND_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ env.BACKEND_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ env.BACKEND_CONTAINER }}" \
            -backend-config="key=aks-prod.tfstate"

      - name: Terraform Plan
        working-directory: terraform-out
        run: |
          terraform plan \
            -var "ssh_public_key=/tmp/aks-ssh-key.pub" \
            -var "environment=prod" \
            -out=prod-${{ github.run_id }}.tfplan

      - name: Terraform Apply
        working-directory: terraform-out
        run: terraform apply -auto-approve prod-${{ github.run_id }}.tfplan
