name: "Infrastructure – Provision AKS"

# ── Trigger ──────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main]
    paths:
      - "infrastructure-modules/**"
      - "infrastructure-live/**"
  workflow_dispatch: # Allow manual trigger

# ── Global permissions for Azure OIDC ────────────────────────────────────────
permissions:
  id-token: write   # Required for OIDC federation
  contents: read

# ── Environment variables shared across all jobs ─────────────────────────────
env:
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_USE_OIDC: true
  TERRAGRUNT_VERSION: "0.68.7"

###############################################################################
# JOBS
###############################################################################
jobs:

  # ╔═══════════════════════════════════════════════════════════════════════════╗
  # ║  Stage 1: Validate                                                      ║
  # ╚═══════════════════════════════════════════════════════════════════════════╝
  validate:
    name: "Terragrunt Validate"
    runs-on: ubuntu-latest
    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_wrapper: false

      - name: Setup Terragrunt
        run: |
          wget -q https://github.com/gruntwork-io/terragrunt/releases/download/v${{ env.TERRAGRUNT_VERSION }}/terragrunt_linux_amd64
          mv terragrunt_linux_amd64 terragrunt
          chmod +x terragrunt
          sudo mv terragrunt /usr/local/bin/

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terragrunt Init & Validate
        working-directory: infrastructure-live/dev
        run: |
          terragrunt run-all init
          terragrunt run-all validate

  # ╔═══════════════════════════════════════════════════════════════════════════╗
  # ║  Stage 2a: Deploy Dev AKS Cluster                                       ║
  # ╚═══════════════════════════════════════════════════════════════════════════╝
  deploy-dev:
    name: "Deploy Dev AKS Cluster"
    needs: validate
    runs-on: ubuntu-latest
    environment: dev   # GitHub Environment – no approval required by default
    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_wrapper: false

      - name: Setup Terragrunt
        run: |
          wget -q https://github.com/gruntwork-io/terragrunt/releases/download/v${{ env.TERRAGRUNT_VERSION }}/terragrunt_linux_amd64
          mv terragrunt_linux_amd64 terragrunt
          chmod +x terragrunt
          sudo mv terragrunt /usr/local/bin/

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Write SSH Public Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PUBLIC_KEY }}" > ~/.ssh/id_rsa.pub
          chmod 600 ~/.ssh/id_rsa.pub

      - name: Terragrunt Apply
        working-directory: infrastructure-live/dev
        run: terragrunt run-all apply --terragrunt-non-interactive -auto-approve

  # ╔═══════════════════════════════════════════════════════════════════════════╗
  # ║  Stage 2b: Deploy Prod AKS Cluster                                      ║
  # ╚═══════════════════════════════════════════════════════════════════════════╝
  deploy-prod:
    name: "Deploy Prod AKS Cluster"
    needs: deploy-dev
    runs-on: ubuntu-latest
    environment: prod   # GitHub Environment – configure Required Reviewers for manual approval
    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_wrapper: false

      - name: Setup Terragrunt
        run: |
          wget -q https://github.com/gruntwork-io/terragrunt/releases/download/v${{ env.TERRAGRUNT_VERSION }}/terragrunt_linux_amd64
          mv terragrunt_linux_amd64 terragrunt
          chmod +x terragrunt
          sudo mv terragrunt /usr/local/bin/

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Write SSH Public Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PUBLIC_KEY }}" > ~/.ssh/id_rsa.pub
          chmod 600 ~/.ssh/id_rsa.pub

      - name: Terragrunt Apply
        working-directory: infrastructure-live/prod
        run: terragrunt run-all apply --terragrunt-non-interactive -auto-approve
