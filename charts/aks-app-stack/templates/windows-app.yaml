apiVersion: apps/v1
kind: Deployment
metadata:
  name: windows-app-deployment
  labels:
    app: windows-app
spec:
  replicas: {{ .Values.apps.dotnet.replicaCount }}
  selector:
    matchLabels:
      app: windows-app
  template:
    metadata:
      labels:
        app: windows-app
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: windows-app
          image: {{ .Values.global.registry }}/{{ .Values.apps.dotnet.repository }}:{{ .Values.apps.dotnet.tag }}
          ports:
            - containerPort: 80
      nodeSelector:
        {{- toYaml .Values.nodeSelectors.windows | nindent 8 }}
---
apiVersion: v1
kind: Service
metadata:
  name: windows-app-lb-service
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 80
  selector:
    app: windows-app
