apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# This adds labels to metadata and templates, but NOT the selector (to avoid immutable field errors)
labels:
  - pairs:
      managed-by: gitops
      environment: dev
    includeSelectors: false

# We can also add common annotations (like for logging)
commonAnnotations:
  enercity.de/logging-enabled: "true"
  enercity.de/team: "devsecops"

resources:
  - ../../base
